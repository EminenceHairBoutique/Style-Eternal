<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Style Eternal — Broken Halo Symbol</title>
  <!-- Halo arc (incomplete circle) -->
  <path d="M40 100 A60 60 0 1 1 160 100" stroke="#E8E4DE" stroke-width="2.5" fill="none"/>
  <!-- Break in halo -->
  <path d="M40 100 A60 60 0 0 1 55 135" stroke="#E8E4DE" stroke-width="2.5" fill="none" opacity="0"/>
  <!-- Crack/break marks -->
  <line x1="38" y1="98" x2="32" y2="106" stroke="#C4A35A" stroke-width="1.5" opacity="0.6"/>
  <line x1="42" y1="102" x2="36" y2="112" stroke="#C4A35A" stroke-width="1" opacity="0.4"/>
  <!-- Fragment dots -->
  <circle cx="30" cy="115" r="1.5" fill="#C4A35A" opacity="0.3"/>
  <circle cx="25" cy="125" r="1" fill="#C4A35A" opacity="0.2"/>
  <!-- Silhouette beneath -->
  <ellipse cx="100" cy="170" rx="20" ry="5" fill="#E8E4DE" opacity="0.1"/>
  <line x1="100" y1="120" x2="100" y2="165" stroke="#E8E4DE" stroke-width="1.5" opacity="0.3"/>
  <circle cx="100" cy="115" r="8" stroke="#E8E4DE" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
