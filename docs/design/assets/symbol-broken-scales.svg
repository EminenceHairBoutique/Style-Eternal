<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <title>Style Eternal — Broken Scales Symbol</title>
  <!-- Scale beam (tilted) -->
  <line x1="40" y1="90" x2="160" y2="70" stroke="#E8E4DE" stroke-width="2"/>
  <!-- Center post -->
  <line x1="100" y1="35" x2="100" y2="80" stroke="#E8E4DE" stroke-width="2"/>
  <line x1="100" y1="80" x2="100" y2="165" stroke="#E8E4DE" stroke-width="1.5" opacity="0.5"/>
  <!-- Top triangle/fulcrum -->
  <path d="M90 35 L100 20 L110 35Z" stroke="#E8E4DE" stroke-width="1.5" fill="none"/>
  <!-- Left pan (lower, heavier) -->
  <path d="M25 95 C30 115, 50 125, 55 95" stroke="#E8E4DE" stroke-width="1.5" fill="none"/>
  <line x1="40" y1="90" x2="25" y2="95" stroke="#E8E4DE" stroke-width="1"/>
  <line x1="40" y1="90" x2="55" y2="95" stroke="#E8E4DE" stroke-width="1"/>
  <!-- Right pan (higher, lighter) -->
  <path d="M145 75 C150 95, 170 105, 175 75" stroke="#E8E4DE" stroke-width="1.5" fill="none"/>
  <line x1="160" y1="70" x2="145" y2="75" stroke="#E8E4DE" stroke-width="1"/>
  <line x1="160" y1="70" x2="175" y2="75" stroke="#E8E4DE" stroke-width="1"/>
  <!-- Crack in beam -->
  <path d="M95 78 L93 82 L97 85 L94 88" stroke="#C4A35A" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Fracture lines -->
  <line x1="105" y1="76" x2="112" y2="72" stroke="#C4A35A" stroke-width="0.75" opacity="0.3"/>
  <!-- Base -->
  <line x1="75" y1="165" x2="125" y2="165" stroke="#E8E4DE" stroke-width="1.5" opacity="0.4"/>
</svg>
