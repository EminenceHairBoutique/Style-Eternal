      <stop offset="0" stop-color="#1A1A1A" stop-opacity="0.8"/>
      <stop offset="0.4" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#1A1A1A" stop-opacity="0.3"/>
