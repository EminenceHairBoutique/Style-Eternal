  <text x="300.0" y="216.0" font-family="Helvetica Neue, Arial, sans-serif" font-weight="300" font-size="14" letter-spacing="0.35em" text-anchor="middle" fill="#6B6B6B">STYLE ETERNAL LOYALTY</text>

  
