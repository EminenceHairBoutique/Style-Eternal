<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <title>Eternal Struggle — Coming Soon Placeholder</title>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="60%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg-grad)"/>
  <!-- Grain overlay -->
  <rect width="800" height="1000" filter="url(#grain)" opacity="0.06"/>
  <!-- Smoke wisps - abstract atmospheric lines -->
  <ellipse cx="400" cy="500" rx="300" ry="80" fill="#2A2A2A" opacity="0.3"/>
  <ellipse cx="350" cy="480" rx="200" ry="40" fill="#3A3A3A" opacity="0.15"/>
  <ellipse cx="450" cy="520" rx="250" ry="50" fill="#2A2A2A" opacity="0.2"/>
  <!-- Gold accent line -->
  <line x1="300" y1="420" x2="500" y2="420" stroke="#C4A35A" stroke-width="0.75" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="64" letter-spacing="0.08em" fill="#E8E4DE" opacity="0.95">ETERNAL</text>
  <text x="400" y="540" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="64" letter-spacing="0.08em" fill="#E8E4DE" opacity="0.95">STRUGGLE</text>
  <!-- Subtitle -->
  <text x="400" y="590" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="13" letter-spacing="0.35em" fill="#E8E4DE" opacity="0.35">DROP 02 — COMING SOON</text>
  <!-- Gold bottom accent -->
  <line x1="300" y1="610" x2="500" y2="610" stroke="#C4A35A" stroke-width="0.75" opacity="0.4"/>
  <!-- Brand footer -->
  <text x="400" y="940" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL — SS26</text>
</svg>
