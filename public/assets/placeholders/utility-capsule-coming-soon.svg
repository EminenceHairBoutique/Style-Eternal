<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <title>Eternal Utility — Nylon Capsule Placeholder</title>
  <defs>
    <linearGradient id="util-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#util-bg)"/>
  <!-- Technical grid lines - architectural feel -->
  <line x1="200" y1="0" x2="200" y2="1000" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="1000" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="0" x2="600" y2="1000" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="333" x2="800" y2="333" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="666" x2="800" y2="666" stroke="#2A2A2A" stroke-width="0.5" opacity="0.3"/>
  <!-- Gold accent line -->
  <line x1="300" y1="440" x2="500" y2="440" stroke="#C4A35A" stroke-width="1" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="490" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="52" letter-spacing="0.12em" fill="#E8E4DE" opacity="0.9">ETERNAL</text>
  <text x="400" y="545" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="52" letter-spacing="0.12em" fill="#E8E4DE" opacity="0.9">UTILITY</text>
  <!-- Subtitle -->
  <text x="400" y="590" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="12" letter-spacing="0.4em" fill="#E8E4DE" opacity="0.3">TECHNICAL. LIMITED. SS26.</text>
  <!-- Bottom accent -->
  <line x1="300" y1="610" x2="500" y2="610" stroke="#C4A35A" stroke-width="1" opacity="0.5"/>
  <!-- Brand footer -->
  <text x="400" y="940" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL</text>
</svg>
