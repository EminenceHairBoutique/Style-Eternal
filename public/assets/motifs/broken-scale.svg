<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Style Eternal — Broken Scale Motif -->
  <g stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central pillar -->
    <line x1="50" y1="15" x2="50" y2="85"/>
    <!-- Tilted balance beam (broken — angled) -->
    <line x1="15" y1="42" x2="85" y2="30"/>
    <!-- Crack in beam -->
    <path d="M48 36 L46 33 L51 35 L49 32" stroke="#1A1A1A" stroke-width="2.5"/>
    <path d="M48 36 L46 33 L51 35 L49 32" stroke="#D4AF37" stroke-width="0.8" opacity="0.5"/>
    <!-- Left pan (lower, empty) -->
    <path d="M10 50 Q15 60 25 60 Q30 60 35 50" stroke-width="1.5"/>
    <line x1="15" y1="42" x2="10" y2="50"/>
    <line x1="15" y1="42" x2="35" y2="50"/>
    <!-- Right pan (higher, with flame) -->
    <path d="M70 38 Q75 48 85 48 Q90 48 95 38" stroke-width="1.5"/>
    <line x1="85" y1="30" x2="70" y2="38"/>
    <line x1="85" y1="30" x2="95" y2="38"/>
    <!-- Small flame in right pan -->
    <path d="M82 38 C80 32 83 28 82 24 C85 28 88 32 85 38" fill="#CC2222" stroke="none" opacity="0.8"/>
    <!-- Base -->
    <line x1="35" y1="85" x2="65" y2="85" stroke-width="2.5"/>
  </g>
</svg>
