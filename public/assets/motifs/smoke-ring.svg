<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Style Eternal — Smoke Ring Motif -->
  <g stroke="#C0C0C0" fill="none" stroke-linecap="round">
    <!-- Outer smoke ring -->
    <circle cx="50" cy="50" r="40" stroke-width="1" opacity="0.15"/>
    <!-- Main smoke rings — staggered, organic -->
    <ellipse cx="50" cy="50" rx="35" ry="33" stroke-width="1.5" opacity="0.25"/>
    <ellipse cx="52" cy="48" rx="28" ry="26" stroke-width="1.5" opacity="0.35"/>
    <ellipse cx="49" cy="51" rx="20" ry="19" stroke-width="1.5" opacity="0.45"/>
    <ellipse cx="51" cy="49" rx="12" ry="11" stroke-width="1.5" opacity="0.55"/>
    <!-- Center void -->
    <circle cx="50" cy="50" r="5" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
