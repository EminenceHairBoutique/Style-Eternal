<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Style Eternal — Minimal Support Stamp -->
  <g>
    <!-- Top line -->
    <line x1="10" y1="6" x2="190" y2="6" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
    <!-- Brand text -->
    <text x="100" y="26" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="11" fill="#D4AF37" letter-spacing="6">STYLE ETERNAL</text>
    <!-- Subtext -->
    <text x="100" y="35" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="6" fill="#D4AF37" letter-spacing="4" opacity="0.6">EST. 2021</text>
    <!-- Bottom line -->
    <line x1="10" y1="39" x2="190" y2="39" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
    <!-- Small decorative diamonds -->
    <polygon points="5,22 8,20 11,22 8,24" fill="#D4AF37" opacity="0.5"/>
    <polygon points="189,22 192,20 195,22 192,24" fill="#D4AF37" opacity="0.5"/>
  </g>
</svg>
