<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" fill="none">
  <title>Eternal Love — Campaign Banner</title>
  <defs>
    <linearGradient id="love-banner-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#140E0E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="600" fill="url(#love-banner-bg)"/>
  <!-- Subtle red glow -->
  <ellipse cx="720" cy="300" rx="400" ry="200" fill="#8B2020" opacity="0.04"/>
  <!-- Flame shapes - abstract -->
  <path d="M720 400 C700 350, 680 300, 690 260 C700 220, 720 200, 720 180 C720 200, 740 220, 750 260 C760 300, 740 350, 720 400Z" fill="#C43030" opacity="0.08"/>
  <path d="M720 380 C708 345, 696 310, 702 280 C708 250, 720 235, 720 220 C720 235, 732 250, 738 280 C744 310, 732 345, 720 380Z" fill="#C43030" opacity="0.05"/>
  <!-- Gold accent -->
  <line x1="560" y1="250" x2="880" y2="250" stroke="#C4A35A" stroke-width="0.75" opacity="0.3"/>
  <!-- Main title -->
  <text x="720" y="310" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="72" letter-spacing="0.1em" fill="#E8E4DE">ETERNAL LOVE</text>
  <!-- Subtitle -->
  <text x="720" y="360" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="14" letter-spacing="0.4em" fill="#E8E4DE" opacity="0.35">DROP 03 — LOVE IS THE ONLY FIRE THAT DOESN'T BURN OUT.</text>
  <!-- Gold accent bottom -->
  <line x1="560" y1="385" x2="880" y2="385" stroke="#C4A35A" stroke-width="0.75" opacity="0.3"/>
  <!-- Brand -->
  <text x="720" y="550" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL — SS26</text>
</svg>
