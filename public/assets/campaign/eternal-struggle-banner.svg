<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" fill="none">
  <title>Eternal Struggle — Campaign Banner</title>
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="40%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="600" fill="url(#banner-bg)"/>
  <!-- Atmospheric smoke bands -->
  <ellipse cx="720" cy="300" rx="600" ry="120" fill="#1A1A1A" opacity="0.4"/>
  <ellipse cx="600" cy="280" rx="400" ry="60" fill="#2A2A2A" opacity="0.2"/>
  <ellipse cx="840" cy="320" rx="350" ry="50" fill="#2A2A2A" opacity="0.15"/>
  <!-- Cracked crown silhouette - abstract -->
  <path d="M680 180 L700 140 L720 170 L740 130 L760 180 L750 175 L740 190 L730 170 L720 185 L710 165 L700 185 L690 175Z" stroke="#C0C0C0" stroke-width="1.5" fill="none" opacity="0.15"/>
  <!-- Crack through crown -->
  <line x1="720" y1="130" x2="720" y2="195" stroke="#C0C0C0" stroke-width="0.75" opacity="0.1"/>
  <!-- Gold accent -->
  <line x1="560" y1="250" x2="880" y2="250" stroke="#C4A35A" stroke-width="0.75" opacity="0.35"/>
  <!-- Main title -->
  <text x="720" y="310" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="72" letter-spacing="0.1em" fill="#E8E4DE">ETERNAL STRUGGLE</text>
  <!-- Subtitle -->
  <text x="720" y="360" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="14" letter-spacing="0.4em" fill="#E8E4DE" opacity="0.35">DROP 02 — POWER BREAKS. UNITY SURVIVES.</text>
  <!-- Gold accent bottom -->
  <line x1="560" y1="385" x2="880" y2="385" stroke="#C4A35A" stroke-width="0.75" opacity="0.35"/>
  <!-- Brand -->
  <text x="720" y="550" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL — SS26</text>
</svg>
