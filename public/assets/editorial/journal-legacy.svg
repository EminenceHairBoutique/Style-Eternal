<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <rect width="800" height="1000" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="haze" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#1A1A1A" stop-opacity="0.8"/>
      <stop offset="0.4" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#1A1A1A" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#haze)"/>
  <rect width="800" height="1000" fill="url(#vignette)"/>
  <!-- Thin border frame -->
