  <text x="400.0" y="516.0" font-family="Helvetica Neue, Arial, sans-serif" font-weight="300" font-size="14" letter-spacing="0.35em" text-anchor="middle" fill="#6B6B6B">STYLE ETERNAL</text>

  
  <rect x="372.0" y="530.0" width="56" height="56" stroke="#E8E4DE" stroke-width="0.5" fill="none" opacity="0.15"/>
  <text x="400.0" y="568.0" font-family="Arial Narrow, Helvetica Neue, sans-serif" font-weight="700" font-size="28" letter-spacing="0.04em" text-anchor="middle" fill="#E8E4DE" opacity="0.15">SE</text>

