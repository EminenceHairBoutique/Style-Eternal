<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <title>Eternal Utility — Drop Teaser (Square)</title>
  <defs>
    <linearGradient id="util-teaser-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#util-teaser-bg)"/>
  <!-- Technical grid -->
  <line x1="270" y1="0" x2="270" y2="1080" stroke="#1A1A1A" stroke-width="0.5" opacity="0.35"/>
  <line x1="540" y1="0" x2="540" y2="1080" stroke="#1A1A1A" stroke-width="0.5" opacity="0.35"/>
  <line x1="810" y1="0" x2="810" y2="1080" stroke="#1A1A1A" stroke-width="0.5" opacity="0.35"/>
  <line x1="0" y1="360" x2="1080" y2="360" stroke="#1A1A1A" stroke-width="0.5" opacity="0.35"/>
  <line x1="0" y1="720" x2="1080" y2="720" stroke="#1A1A1A" stroke-width="0.5" opacity="0.35"/>
  <!-- Gold accent -->
  <line x1="420" y1="470" x2="660" y2="470" stroke="#C4A35A" stroke-width="1" opacity="0.5"/>
  <!-- Title -->
  <text x="540" y="530" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="52" letter-spacing="0.12em" fill="#E8E4DE">ETERNAL</text>
  <text x="540" y="585" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="52" letter-spacing="0.12em" fill="#E8E4DE">UTILITY</text>
  <!-- Subtitle -->
  <text x="540" y="635" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="12" letter-spacing="0.4em" fill="#E8E4DE" opacity="0.3">NYLON CAPSULE — LIMITED</text>
  <!-- Bottom accent -->
  <line x1="420" y1="655" x2="660" y2="655" stroke="#C4A35A" stroke-width="1" opacity="0.5"/>
  <!-- Brand -->
  <text x="540" y="1020" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL — SS26</text>
</svg>
