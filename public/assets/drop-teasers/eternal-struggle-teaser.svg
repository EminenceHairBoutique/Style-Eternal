<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <title>Eternal Struggle — Drop Teaser (Square)</title>
  <defs>
    <linearGradient id="teaser-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#teaser-bg)"/>
  <!-- Atmospheric smoke -->
  <ellipse cx="540" cy="540" rx="380" ry="150" fill="#1A1A1A" opacity="0.5"/>
  <ellipse cx="480" cy="520" rx="250" ry="80" fill="#2A2A2A" opacity="0.25"/>
  <!-- Abstract broken scales symbol -->
  <path d="M500 420 L540 400 L580 420" stroke="#C0C0C0" stroke-width="1.5" fill="none" opacity="0.2"/>
  <line x1="540" y1="400" x2="540" y2="440" stroke="#C0C0C0" stroke-width="1.5" opacity="0.2"/>
  <line x1="535" y1="420" x2="515" y2="430" stroke="#C0C0C0" stroke-width="1" opacity="0.12" stroke-dasharray="3 3"/>
  <!-- Gold line -->
  <line x1="420" y1="470" x2="660" y2="470" stroke="#C4A35A" stroke-width="0.75" opacity="0.4"/>
  <!-- Title -->
  <text x="540" y="530" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="56" letter-spacing="0.1em" fill="#E8E4DE">ETERNAL</text>
  <text x="540" y="590" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="56" letter-spacing="0.1em" fill="#E8E4DE">STRUGGLE</text>
  <!-- Date teaser -->
  <text x="540" y="640" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="13" letter-spacing="0.4em" fill="#E8E4DE" opacity="0.3">SS26 — DROP 02</text>
  <!-- Bottom accent -->
  <line x1="420" y1="660" x2="660" y2="660" stroke="#C4A35A" stroke-width="0.75" opacity="0.4"/>
  <!-- Brand -->
  <text x="540" y="1020" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="10" letter-spacing="0.3em" fill="#E8E4DE" opacity="0.2">STYLE ETERNAL</text>
</svg>
