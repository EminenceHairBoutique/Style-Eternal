<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <title>Style Eternal — Secondary Wordmark</title>
  <!-- SE large letters -->
  <text x="200" y="42" text-anchor="middle" font-family="'Oswald', 'Arial Narrow', sans-serif" font-weight="700" font-size="44" letter-spacing="0.25em" fill="#E8E4DE">SE</text>
  <!-- STYLE ETERNAL beneath -->
  <text x="200" y="68" text-anchor="middle" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="400" font-size="11" letter-spacing="0.35em" fill="#E8E4DE" opacity="0.6">STYLE ETERNAL</text>
  <!-- Gold divider line -->
  <line x1="150" y1="50" x2="250" y2="50" stroke="#C4A35A" stroke-width="0.75" opacity="0.5"/>
</svg>
